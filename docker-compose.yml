services:
  db:
    image: mysql:5.7
    container_name: prestashop-local-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - db_data:/var/lib/mysql

  prestashop:
    image: prestashop/prestashop:${PRESTASHOP_VERSION}-apache
    container_name: prestashop-local-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PS_BIND_IP}:${PS_PORT}:80"
    environment:
      DB_SERVER: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWD: ${DB_PASSWORD}
      PS_DOMAIN: ${PS_DOMAIN}
      PS_LANGUAGE: ${PS_LANGUAGE}
      PS_COUNTRY: ${PS_COUNTRY}
      PS_ENABLE_SSL: ${PS_ENABLE_SSL}
      PS_HANDLE_DYNAMIC_DOMAIN: ${PS_HANDLE_DYNAMIC_DOMAIN}
      PS_TRUSTED_PROXIES: ${PS_TRUSTED_PROXIES}
      PS_INSTALL_AUTO: "1"
      PS_DEMO_MODE: ${PS_DEMO_MODE}
      PS_FOLDER_ADMIN: ${PS_FOLDER_ADMIN}
      ADMIN_MAIL: ${ADMIN_MAIL}
      ADMIN_PASSWD: ${ADMIN_PASSWD}
    volumes:
      - prestashop_data:/var/www/html
      - ./docker/post-install-scripts:/tmp/post-install-scripts:ro
      - ./docker/apache/conf-enabled/zz-reverse-proxy-ssl.conf:/etc/apache2/conf-enabled/zz-reverse-proxy-ssl.conf:ro

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: prestashop-local-phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PMA_BIND_IP}:${PMA_PORT}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}

volumes:
  db_data:
  prestashop_data:
