<IfModule mod_setenvif.c>
    # When Apache is behind an SSL-terminating reverse proxy, propagate the
    # original scheme into the CGI/PHP HTTPS server var so Symfony admin
    # middleware and legacy PrestaShop code both detect secure requests.
    SetEnvIf X-Forwarded-Proto "^https$" HTTPS=on
    SetEnvIf X-Forwarded-Ssl "^on$" HTTPS=on
</IfModule>
